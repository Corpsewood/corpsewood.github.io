<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Corpsewood Archive</title>

<meta name="description" content="Restricted Corpsewood archive system. Unauthorized access is prohibited.">

<style>
body {
    background: #050505;
    color: #00ff88;
    font-family: monospace;
    margin: 0;
    padding: 40px;
    overflow-x: hidden;
}

/* Scanlines */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        rgba(0,255,136,0.04) 0px,
        rgba(0,255,136,0.04) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events: none;
    animation: scanMove 8s linear infinite;
}

@keyframes scanMove {
    from { background-position: 0 0; }
    to { background-position: 0 100px; }
}

/* Terminal */
.terminal {
    max-width: 800px;
    margin: auto;
}

/* Boot text */
#bootText {
    white-space: pre-line;
    margin-bottom: 30px;
}

/* Files */
.file {
    padding: 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: 0.2s;
}

.file:hover {
    border-left: 2px solid #00ff88;
    background: rgba(0,255,136,0.05);
    transform: translateX(5px);
}

/* Preview */
.preview {
    margin-top: 30px;
    border: 1px solid #00ff88;
    padding: 15px;
    display: none;
    max-width: 300px;
}

.preview img {
    width: 100%;
    border: 1px solid #00ff88;
}

.preview-title {
    margin-bottom: 10px;
}

/* No image fallback */
.no-image {
    border: 1px dashed #00ff88;
    padding: 30px;
    text-align: center;
    opacity: 0.6;
}

.open-btn {
    margin-top: 10px;
    cursor: pointer;
    display: inline-block;
    border: 1px solid #00ff88;
    padding: 5px 10px;
}

.open-btn:hover {
    background: rgba(0,255,136,0.1);
}

/* Footer */
.footer {
    margin-top: 40px;
    opacity: 0.6;
    font-size: 0.9em;
}
</style>
</head>

<body>

<div class="terminal">

<div id="bootText"></div>

<div id="fileSystem" style="display:none;">

<div class="file" onclick="showPreview('345s_v1.pmp','345s.png','https://corpsewood.github.io/345s/')">
> 345s_v1.pmp
</div>

<div class="file" onclick="showPreview('archive_v2.pmp','xhsx.png','https://corpsewood.github.io/v2/')">
> archive_v2.pmp
</div>

<div class="file" onclick="showPreview('message.html','message.png','https://corpsewood.github.io/message/')">
> message.html
</div>

<div class="file" onclick="showPreview('info.txt',null,'https://corpsewood.github.io/Info/')">
> info.txt
</div>

<div class="file" onclick="showPreview('corpsewood.html',null,'https://corpsewood.github.io/Corpsewood/')">
> corpsewood.html
</div>

</div>

<!-- Preview -->
<div id="preview" class="preview">
    <div class="preview-title" id="previewTitle"></div>
    <div id="previewContent"></div>
    <div class="open-btn" onclick="openSelected()">Open file</div>
</div>

<div class="footer">
STATUS: UNSTABLE<br>
USER: 345s<br>
IHDUIXO
</div>

</div>

<audio id="ambientSound" loop>
    <source src="dragon-studio-creepy-industrial-sounds-ambience-482892.mp3" type="audio/mpeg">
</audio>

<script>
const bootText = document.getElementById("bootText");
const fileSystem = document.getElementById("fileSystem");

const lines = [
"Initializing Corpsewood Archive...",
"Accessing user: 345s",
"Loading file index...",
"",
"ACCESS GRANTED"
];

let lineIndex = 0;
let charIndex = 0;

function typeLine() {
    if (lineIndex < lines.length) {
        if (charIndex < lines[lineIndex].length) {
            bootText.innerHTML += lines[lineIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeLine, 25);
        } else {
            bootText.innerHTML += "\n";
            lineIndex++;
            charIndex = 0;
            setTimeout(typeLine, 250);
        }
    } else {
        fileSystem.style.display = "block";
    }
}

typeLine();

/* Preview system */
let selectedURL = "";

function showPreview(name, img, url) {
    document.getElementById("preview").style.display = "block";
    document.getElementById("previewTitle").textContent = "> " + name;

    const content = document.getElementById("previewContent");
    content.innerHTML = "";

    if (img) {
        const image = document.createElement("img");
        image.src = img;
        content.appendChild(image);
    } else {
        const fallback = document.createElement("div");
        fallback.className = "no-image";
        fallback.textContent = "No preview available";
        content.appendChild(fallback);
    }

    selectedURL = url;
}

function openSelected() {
    window.location.href = selectedURL;
}

/* Audio */
const ambient = document.getElementById('ambientSound');
ambient.volume = 0;
ambient.muted = true;

function startAudio() {
    ambient.muted = false;
    ambient.play();

    let vol = 0;
    const fade = setInterval(() => {
        if (vol < 0.2) {
            vol += 0.01;
            ambient.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 100);
}

ambient.play().then(startAudio).catch(() => {
    document.addEventListener("click", function init() {
        startAudio();
        document.removeEventListener("click", init);
    });
});
</script>

</body>
</html>
