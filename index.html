<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archive</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Courier New", monospace;
}

/* BOARD */
#board {
    width: 100vw;
    height: 100vh;
    background-image: url('https://file.garden/Z9xGnXpf6B5_2o1b/ekaterina-novitskaya-KugwNl9jX1Q-unsplash.jpg');
    background-size: cover;
    background-position: center;
    position: relative;
}

/* SMALL PAPERS ON BOARD */
.paperNote {
    position: absolute;
    width: 160px;
    padding: 10px;
    background: #f5ecd7;
    border: 1px solid #c9b89c;
    box-shadow: 3px 3px 12px rgba(0,0,0,0.8);
    cursor: pointer;
    transform: rotate(-2deg);
}

.paperNote:hover {
    transform: scale(1.03) rotate(0deg);
}

/* BIG PAPER VIEW */
#paperView {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-1deg);
    width: 520px;
    padding: 25px;
    background: #f5ecd7;
    color: #111;
    box-shadow: 0 15px 50px rgba(0,0,0,0.9);
    display: none;
    border: 1px solid #c9b89c;
}

/* CLOSE */
#close {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
}

/* LINKS */
.link {
    display: inline-block;
    margin-top: 15px;
    border-bottom: 1px solid black;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="board">

    <!-- DAED NOTE -->
    <div class="paperNote" style="top:20%; left:25%;" onclick="openPaper('daed')">
        RANGER LOG<br>345
    </div>

    <!-- FIV NOTE -->
    <div class="paperNote" style="top:35%; left:65%;" onclick="openPaper('fiv')">
        USER FILE<br>FIV
    </div>

    <!-- CORPSEWOOD -->
    <div class="paperNote" style="top:60%; left:50%;" onclick="openPaper('corpsewood')">
        CORPSEWOOD<br><i>RESTRICTED</i>
    </div>

    <!-- NULL -->
    <div id="nullNote" class="paperNote" style="top:75%; left:30%; display:none;" onclick="openPaper('null')">
        SUBJECT<br>NULL
    </div>

    <!-- 🔥 NEW CHAPTER 1 NOTE -->
    <div class="paperNote" style="top:50%; left:15%;" onclick="openPaper('chapter1')">
        FILE<br>CHAPTER_1
    </div>

</div>

<!-- BIG PAPER -->
<div id="paperView">
    <div id="close" onclick="closePaper()">✕</div>
    <div id="content"></div>
</div>

<script>
let discovered = {
    daed: false,
    fiv: false
};

function openPaper(type) {
    document.getElementById("paperView").style.display = "block";

    let html = "";

    if(type === "daed") {
        discovered.daed = true;
        html = `
        <h3>RANGER LOG – 345</h3>
        <p>I hear it again.</p>
        <p>It’s not wind.</p>
        <p>I shouldn’t have let Fiv in.</p>

        <div class="link" onclick="openPaper('corpsewood')">
        → Referenced Location: Corpsewood
        </div>
        `;
    }

    if(type === "fiv") {
        discovered.fiv = true;
        html = `
        <h3>USER FILE: FIV</h3>
        <p>Access granted by User 345</p>
        <p>Experiment conducted</p>
        <p>Subject: Null</p>

        <div class="link" onclick="openPaper('null')">
        → View Subject File
        </div>
        `;
    }

    if(type === "corpsewood") {
        html = `
        <h3>LOCATION: CORPSEWOOD</h3>
        <p>Status: Restricted</p>
        <p>Multiple incidents reported</p>
        `;
    }

    if(type === "null") {
        html = `
        <h3>SUBJECT: NULL</h3>
        <p>Status: Unstable</p>
        <p>Decomposition observed</p>
        <p>Gravestone placed in Corpsewood</p>
        `;
    }

    /* 🔥 CHAPTER 1 LOGIC */
    if(type === "chapter1") {
        html = `
        <h3>FILE: CHAPTER 1</h3>
        <p>Status: Accessible</p>
        <p>Origin unclear</p>

        <div class="link" onclick="openChapter()">
        → Open File
        </div>
        `;
    }

    document.getElementById("content").innerHTML = html;

    if(discovered.daed && discovered.fiv) {
        document.getElementById("nullNote").style.display = "block";
    }
}

/* 🔥 REDIRECT */
function openChapter() {
    window.location.href = "https://corpsewood.github.io/chapter1.html";
}

function closePaper() {
    document.getElementById("paperView").style.display = "none";
}
</script>

</body>
</html>
