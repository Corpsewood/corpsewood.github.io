<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>345s</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Times New Roman", monospace;
      background: black;
      color: white;
    }

    /* BACKGROUND */
    .bg {
      position: fixed;
      inset: 0;
      background: url('https://corpsewood.github.io/FREE_background_video_loop_decent_animated_grey_smoke_background.gif')
        no-repeat center center;
      background-size: 150% 150%;
      animation: slowZoom 20s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes slowZoom {
      from { transform: scale(1.05); }
      to { transform: scale(1.2); }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9), rgba(0,0,0,1));
      z-index: 1;
    }

    /* LOGO */
    .logo {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      cursor: pointer;
    }

    .logo img {
      width: 140px;
    }

    /* CODE GATE */
    .gate {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.92);
      z-index: 20;
    }

    .gate.active {
      display: flex;
    }

    input {
      background: black;
      border: 1px solid white;
      color: white;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 5px;
      outline: none;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      background: white;
      border: none;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    /* FLASH */
    .flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
    }

    .flash.active {
      animation: flash 0.3s ease;
    }

    @keyframes flash {
      0% { opacity: 0; }
      20% { opacity: 0.6; }
      100% { opacity: 0; }
    }

    /* SHAKE */
    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translate(0); }
      25% { transform: translate(3px, -2px); }
      50% { transform: translate(-3px, 2px); }
      75% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

    /* MAIN */
    .wrap {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    .chapters {
      margin-top: 30px;
      display: flex;
      gap: 30px;
      justify-content: center;
    }

    .chapter {
      max-width: 125px;
      background: white;
      color: black;
      text-align: center;
      transition: 0.3s;
    }

    .chapter:hover {
      filter: invert(100%);
      transform: scale(1.05);
    }

    .chapter a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- LOGO -->
  <div class="logo" id="logo">
    <img src="https://corpsewood.github.io/logo.png" />
  </div>

  <!-- FLASH -->
  <div class="flash" id="flash"></div>

  <!-- CODE GATE -->
  <div class="gate" id="gate">
    <input id="codeInput" placeholder="ENTER CODE" />
    <button onclick="checkCode()">ENTER</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="wrap">
    <p>missed</p>

    <div class="chapters">
      <div class="chapter">
        <a href="https://corpsewood.github.io/Aditus.html">
          <img src="https://corpsewood.github.io/345s.png" width="125" />
          <p>Aditus</p>
        </a>
      </div>
    </div>
  </div>

  <script>
    const logo = document.getElementById("logo");
    const gate = document.getElementById("gate");
    const msg = document.getElementById("msg");
    const flash = document.getElementById("flash");
    const input = document.getElementById("codeInput");

    // Base64 encoded "404124"
    const realCode = atob("NDA0MTI0");

    logo.addEventListener("click", () => {
      gate.classList.add("active");
      input.focus();
    });

    function triggerFlash() {
      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");
    }

    function shakeScreen() {
      document.body.classList.add("shake");
      setTimeout(() => document.body.classList.remove("shake"), 250);
    }

    function checkCode() {
      const val = input.value;

      if (val === realCode) {
        msg.textContent = "ACCESS GRANTED";
        triggerFlash();

        setTimeout(() => {
          window.location.href = "https://corpsewood.github.io/input.html";
        }, 800);

      } else {
        msg.textContent = "ACCESS DENIED";
        shakeScreen();
        triggerFlash();
        input.value = "";
      }
    }
  </script>
</body>
</html>
