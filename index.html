<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Corpsewood File Dump</title>

<meta name="description" content="A documentation about the place called 'Corpsewood', this website is runned by multible people.">

<style>
@font-face {
    font-family: "ComicSans";
    src: url("Comic Sans MS 400.ttf") format("truetype");
}

body {
    font-family: "ComicSans", sans-serif;
    color: #ffffff;
    text-align: center;
    margin: 0;
    padding: 50px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;

    background-image: 
        repeating-linear-gradient(
            45deg,
            #222 0px,
            #222 10px,
            #444 10px,
            #444 20px
        ),
        radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 70%);
    background-blend-mode: overlay;
    background-size: cover;
    animation: fadeIn 0.8s ease-in-out, moveBackground 30s linear infinite;
    transition: background 0.3s ease-in-out;

    will-change: background-position;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes moveBackground {
    0% { background-position: 0 0, center; }
    100% { background-position: 0 400px, center; }
}

h1 { font-size: 2.5em; margin-bottom: 10px; }

.description {
    font-size: 1em;
    margin-bottom: 40px;
    opacity: 0.8;
}

.box-container {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.box-link { text-decoration: none; color: #ffffff; }

.box {
    width: 150px;
    height: 150px;
    max-width: 40vw;
    max-height: 40vw;
    background-color: #1a1a1a;
    border: 2px solid #ffffff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s, border-color 0.3s;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    outline: none;
}

.box img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    transition: transform 0.3s, box-shadow 0.3s;
}

.box:hover {
    transform: scale(1.05);
    background-color: #222;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
    border-color: #00ff00;
}

.box:hover img {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(255,255,255,0.6);
}

.box-text { margin-top: 10px; font-size: 1.1em; }

.bottom-link {
    margin-top: auto;
    padding-top: 40px;
    font-size: 1em;
}

.bottom-link a {
    color: #ffffff;
    text-decoration: underline;
    transition: color 0.3s, text-shadow 0.3s;
}

.bottom-link a:hover {
    color: #00ff00;
    text-shadow: 0 0 8px #00ff00, 0 0 16px #00ff00;
}

.bottom-link span {
    margin-left: 15px;
    font-weight: bold;
    color: #000000;
    text-shadow: 0 0 2px #000000;
    animation: flicker 1.5s infinite;
}

@keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
    }
    20%, 22%, 24%, 55% {
        opacity: 0.3;
    }
}

/* Mobile tweak */
@media (max-width: 600px) {
    .box {
        width: 120px;
        height: 120px;
    }

    h1 {
        font-size: 1.8em;
    }
}
</style>
</head>

<body>

<h1>Welcome to the file dump user called "345s"</h1>
<div class="description">
A documentation about the place called "Corpsewood", this website is runned by multible people.
</div>

<div class="box-container">

    <div>
        <a class="box-link" href="https://corpsewood.github.io/345s/">
            <div class="box" tabindex="0">
                <img src="345s.png">
            </div>
        </a>
        <div class="box-text">V1</div>
    </div>

    <div>
        <a class="box-link" href="https://corpsewood.github.io/message/">
            <div class="box" tabindex="0">
                <img src="message.png">
            </div>
        </a>
        <div class="box-text">Contact</div>
    </div>

    <div>
        <a class="box-link" href="https://corpsewood.github.io/v2/">
            <div class="box" tabindex="0">
                <img src="xhsx.png">
            </div>
        </a>
        <div class="box-text">V2</div>
    </div>

    <div>
        <a class="box-link" href="https://corpsewood.github.io/Info/">
            <div class="box" tabindex="0" style="font-size: 1.5em;">
                Info
            </div>
        </a>
        <div class="box-text">Info</div>
    </div>

</div>

<div class="bottom-link">
    <a href="https://corpsewood.github.io/Corpsewood/">Back to Corpsewood</a>
    <span>IHDUIXO</span>
</div>

<audio id="ambientSound" loop>
    <source src="dragon-studio-creepy-industrial-sounds-ambience-482892.mp3" type="audio/mpeg">
</audio>

<script>
const ambient = document.getElementById('ambientSound');

ambient.volume = 0;
ambient.muted = true;

ambient.play().then(() => {
    ambient.muted = false;

    let vol = 0;
    const fadeIn = setInterval(() => {
        if (vol < 0.2) {
            vol += 0.01;
            ambient.volume = vol;
        } else {
            clearInterval(fadeIn);
        }
    }, 100);

}).catch(() => {
    const startAudio = () => {
        ambient.muted = false;
        ambient.play();

        let vol = 0;
        const fadeIn = setInterval(() => {
            if (vol < 0.2) {
                vol += 0.01;
                ambient.volume = vol;
            } else {
                clearInterval(fadeIn);
            }
        }, 100);

        document.removeEventListener("click", startAudio);
    };

    document.addEventListener("click", startAudio);
});
</script>

</body>
</html>
